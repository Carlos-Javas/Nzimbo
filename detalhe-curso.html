<!DOCTYPE html>
<html lang="pt">
<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 62 62'%3E%3Crect fill='%230c0c0c' width='62' height='62' rx='14'/%3E%3Crect fill='%23F5A623' x='8' y='8' width='46' height='46' rx='10'/%3E%3Cpolygon fill='none' stroke='%230c0c0c' stroke-width='2.2' stroke-miterlimit='10' points='17 45 21 45 21 22 35 41 35 45 40 45 40 36 43 36 43 31 40 31 40 27 43 27 43 22 40 22 40 14 35 14 35 22 35 33 28 22 22 14 17 14 17 22 13 22 13 27 17 27 17 31 13 31 13 36 17 36 17 44 17 45'/%3E%3C/svg%3E"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 62 62'%3E%3Crect fill='%230c0c0c' width='62' height='62' rx='14'/%3E%3Crect fill='%23F5A623' x='8' y='8' width='46' height='46' rx='10'/%3E%3Cpolygon fill='none' stroke='%230c0c0c' stroke-width='2.2' stroke-miterlimit='10' points='17 45 21 45 21 22 35 41 35 45 40 45 40 36 43 36 43 31 40 31 40 27 43 27 43 22 40 22 40 14 35 14 35 22 35 33 28 22 22 14 17 14 17 22 13 22 13 27 17 27 17 31 13 31 13 36 17 36 17 44 17 45'/%3E%3C/svg%3E"/>
  <meta name="theme-color" content="#0c0c0c"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Curso – Nzimbo</title>
  <link rel="stylesheet" href="global.css"/>
  <link rel="stylesheet" href="pages.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
</head>
<body>
<header class="navbar" id="navbar"></header>
<div id="courseHero" style="padding:120px 0 0;background:linear-gradient(135deg,#1a1000,#3a2500);margin-top:64px;">
  <div class="container">
    <div class="breadcrumb" style="padding-top:0;padding-bottom:16px;">
      <a href="home.html">Início</a><span class="breadcrumb-sep">/</span>
      <a href="explorar-cursos.html">Cursos</a><span class="breadcrumb-sep">/</span>
      <span id="breadCrumbTitle">Curso</span>
    </div>
  </div>
</div>
<section style="padding:0 0 80px;">
  <div class="container">
    <div class="detail-layout">
      <div class="detail-main">
        <div id="courseTags" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;"></div>
        <h1 id="courseTitle">A carregar...</h1>
        <div class="detail-meta">
          <div id="courseRating"></div><span>•</span>
          <span id="courseStudents"></span><span>•</span>
          <span id="courseInstructor" style="color:var(--gold);font-weight:600;"></span>
        </div>
        <div class="detail-tabs">
          <button class="detail-tab active" onclick="showTab('visao',this)">Visão geral</button>
          <button class="detail-tab" onclick="showTab('curriculo',this)">Currículo</button>
          <button class="detail-tab" onclick="showTab('instrutor-tab',this)">Instrutor</button>
        </div>
        <div id="visao" class="tab-panel active">
          <h3 style="margin-bottom:16px;">O que vais aprender</h3>
          <div id="learningPoints" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px;"></div>
          <h3 style="margin-bottom:12px;">Descrição</h3>
          <p id="courseDesc" style="font-size:15px;color:rgba(255,255,255,0.55);line-height:1.8;"></p>
        </div>
        <div id="curriculo" class="tab-panel">
          <p style="font-size:14px;color:var(--grey);margin-bottom:16px;" id="curriculumMeta"></p>
          <div class="module-list" id="moduleList"></div>
        </div>
        <div id="instrutor-tab" class="tab-panel">
          <div id="instructorInfo" style="display:flex;align-items:flex-start;gap:24px;padding:28px;background:var(--black3);border:1px solid var(--border);border-radius:16px;"></div>
        </div>
      </div>
      <div class="buy-card">
        <div class="buy-price" id="buyPrice">—</div>
        <div class="buy-old-price" id="buyOldPrice"></div>
        <button class="btn btn-gold btn-lg buy-btn" id="btnBuyNow" onclick="handleBuy()" style="width:100%;">Comprar agora</button>
        <button class="btn btn-dark btn-lg buy-btn" style="width:100%;" onclick="handleWishlist()">Adicionar à wishlist</button>
        <p style="text-align:center;font-size:12px;color:var(--grey);margin-top:8px;">Garantia de 7 dias · Acesso vitalício</p>
        <ul class="buy-features" id="buyFeatures"></ul>
        <div style="margin-top:20px;padding:14px;background:rgba(245,166,35,0.07);border:1px solid rgba(245,166,35,0.2);border-radius:10px;text-align:center;">
          <p style="font-size:12px;color:var(--gold);font-weight:600;">✓ Paga com Multicaixa Express</p>
        </div>
      </div>
    </div>
  </div>
</section>
<footer id="footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="nzimbo-auth.js"></script>
<script src="nzimbo-courses.js"></script>
<script src="components.js"></script>
<script>
'use strict';
const LOGO_SVG=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62.13 62.13"><rect fill="#fcfcfc" width="62.13" height="62.13" rx="17.09"/><polygon fill="none" stroke="#0c0c0c" stroke-miterlimit="10" stroke-width="2" points="19.62 47.33 23.44 47.33 23.69 21.92 39.45 42.99 39.45 47.33 44.28 47.33 44.28 37.93 47.59 37.93 47.59 33.1 44.03 33.06 44.03 28.77 47.84 28.77 47.84 23.94 44.03 23.94 44.03 14.28 39.2 14.28 39.2 23.94 39.2 35.13 31.06 23.94 23.94 14.28 18.86 14.28 18.86 23.94 14.28 23.94 14.28 29.03 19.11 29.03 19.11 33.35 14.28 33.35 14.28 38.18 19.11 38.18 19.11 46.83 19.11 47.84 19.62 47.33"/></svg>`;
buildNav('cursos');buildFooter();

const courseId=new URLSearchParams(location.search).get('id');
const course=NzimboCourses.getCourse(courseId);
const session=NzimboAuth.getSession();
const enrolled=session&&NzimboCourses.getProgress(courseId);

if(course){
  const bgs={Marketing:'135deg,#1a1000,#3a2500',Programação:'135deg,#001420,#003050',Design:'135deg,#150020,#300040'};
  document.getElementById('courseHero').style.background=`linear-gradient(${bgs[course.category]||'135deg,#0d0d0d,#1a1a1a'})`;
  document.title=course.title+' – Nzimbo';
  document.getElementById('breadCrumbTitle').textContent=course.title;
  document.getElementById('courseTitle').textContent=course.title;
  document.getElementById('courseTags').innerHTML=`<span class="tag tag-gold">${course.category}</span><span class="tag">${course.level}</span>`;
  document.getElementById('courseRating').innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="#F5A623"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><strong style="color:var(--gold);">${course.rating}</strong>`;
  document.getElementById('courseStudents').textContent=(course.students||0).toLocaleString()+' alunos';
  document.getElementById('courseInstructor').textContent=course.instructor;
  document.getElementById('courseDesc').textContent=course.description;
  const pts=['Estratégias práticas aplicadas ao mercado angolano','Criar campanhas reais do zero','Ferramentas profissionais gratuitas','Certificado de conclusão reconhecido','Suporte com o instrutor','Actualizações vitalícias'];
  document.getElementById('learningPoints').innerHTML=pts.map(p=>`<div style="display:flex;gap:10px;font-size:14px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round" style="flex-shrink:0;margin-top:2px;"><polyline points="20 6 9 17 4 12"/></svg>${p}</div>`).join('');
  const totalLessons=course.modules.reduce((s,m)=>s+(m.lessons||[]).length,0);
  document.getElementById('curriculumMeta').textContent=`${course.modules.length} módulos · ${totalLessons} aulas`;
  document.getElementById('moduleList').innerHTML=course.modules.flatMap(mod=>(mod.lessons||[]).map(les=>`<div class="module-item${les.free?' free':''}"><div class="module-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">${les.free?'<polygon points="5 3 19 12 5 21 5 3"/>':'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>'}</svg></div><span class="module-title">${les.title}</span><span class="module-dur">${les.free?'<span style="color:var(--gold);">GRÁTIS · </span>':''}${les.duration}</span></div>`)).join('');
  document.getElementById('instructorInfo').innerHTML=`<div class="avatar" style="width:72px;height:72px;font-size:24px;flex-shrink:0;">${course.instructorAvatar||'C'}</div><div><h3 style="margin-bottom:4px;color:var(--gold);">${course.instructor}</h3><p style="font-size:13px;color:var(--grey);margin-bottom:12px;">${course.category} Specialist</p><p style="font-size:14px;color:rgba(255,255,255,0.55);">${course.description}</p></div>`;
  document.getElementById('buyPrice').textContent=course.price.toLocaleString('pt-AO')+' Kz';
  if(course.oldPrice>course.price)document.getElementById('buyOldPrice').textContent=course.oldPrice.toLocaleString('pt-AO')+' Kz';
  document.getElementById('buyFeatures').innerHTML=[`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${totalLessons} aulas`,`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Certificado de conclusão`,`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Garantia de 7 dias`].map(f=>`<li style="display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(255,255,255,0.6);">${f}</li>`).join('');
  if(enrolled){
    const btn=document.getElementById('btnBuyNow');
    btn.textContent='▶ Continuar curso';
    btn.onclick=()=>window.location.href=`buyer/player.html?id=${courseId}`;
  }
}

function handleBuy(){
  if(!session){window.location.href='auth/register.html';return;}
  NzimboCourses.enrollCourse(courseId);
  window.location.href=`buyer/player.html?id=${courseId}`;
}
function handleWishlist(){
  const t=document.createElement('div');t.style.cssText='position:fixed;bottom:24px;right:24px;background:#0a1a0a;border:1px solid rgba(34,197,94,0.3);color:#86efac;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;';t.textContent='Adicionado aos favoritos!';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}
function showTab(id,btn){document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.detail-tab').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');btn.classList.add('active');}
</script>
<script src="global.js"></script>
</body>
</html>
