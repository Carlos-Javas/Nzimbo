<body>
<header class="topbar">
  <a href="../home.html" class="topbar-logo"><div class="topbar-logo-icon"></div><span class="topbar-logo-text">Nzimbo</span></a>
  <div class="topbar-search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Pesquisar..."/></div>
  <div class="topbar-actions">

  </div>
</header>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-content">

  <div class="page-header reveal">
    <div><h1 class="page-title">Métodos de Pagamento</h1><p class="page-subtitle">Gere os teus métodos de pagamento</p></div>
    <div class="page-header-actions">
      <button class="btn btn-gold" onclick="showAddModal()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar método
      </button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;" class="reveal">

    <div class="payment-method-card selected">
      <div class="payment-card-default">Padrão</div>
      <div class="payment-icon-wrap">
        <svg width="28" height="20" viewBox="0 0 50 35"><rect width="50" height="35" rx="4" fill="#1A1A2E"/><text x="50%" y="60%" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="bold" fill="#F5A623">MCX</text></svg>
      </div>
      <div class="payment-info">
        <div class="payment-title">Multicaixa Express</div>
        <div class="payment-detail">+244 923 456 789 · Verificado</div>
      </div>
      <button onclick="removePayment(this)" class="btn btn-ghost btn-sm" style="margin-left:auto;color:var(--error);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </button>
    </div>

    <div class="payment-method-card">
      <div class="payment-icon-wrap">
        <svg width="32" height="22" viewBox="0 0 50 35"><rect width="50" height="35" rx="4" fill="#1A1A2E"/><circle cx="19" cy="17" r="10" fill="#EB001B"/><circle cx="31" cy="17" r="10" fill="#F79E1B"/><path d="M25 9.5a10 10 0 000 15" fill="#FF5F00"/></svg>
      </div>
      <div class="payment-info">
        <div class="payment-title">Mastercard •••• 4521</div>
        <div class="payment-detail">Expira 08/2026</div>
      </div>
      <button onclick="setDefault(this)" class="btn btn-outline btn-sm" style="margin-left:auto;white-space:nowrap;">Definir padrão</button>
    </div>

  </div>

  <!-- MÉTODOS DISPONÍVEIS -->
  <div class="card reveal reveal-delay-1">
    <div class="card-header"><span class="card-title">Outros métodos disponíveis</span></div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
        <div style="padding:18px;border-radius:12px;background:var(--b4);border:1px solid var(--border);text-align:center;cursor:pointer;transition:border-color 0.2s;" onclick="showAddModal()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(245,166,35,0.7)" stroke-width="1.5" stroke-linecap="round" style="margin-bottom:10px;"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          <div style="font-size:13px;font-weight:600;">Cartão Visa</div>
          <div style="font-size:11px;color:var(--grey);">Adicionar</div>
        </div>
        <div style="padding:18px;border-radius:12px;background:var(--b4);border:1px solid var(--border);text-align:center;cursor:pointer;transition:border-color 0.2s;" onclick="showAddModal()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(245,166,35,0.7)" stroke-width="1.5" stroke-linecap="round" style="margin-bottom:10px;"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          <div style="font-size:13px;font-weight:600;">Transferência</div>
          <div style="font-size:11px;color:var(--grey);">Bancária</div>
        </div>
        <div style="padding:18px;border-radius:12px;background:var(--b4);border:1px solid var(--border);text-align:center;cursor:pointer;transition:border-color 0.2s;" onclick="showAddModal()">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(245,166,35,0.7)" stroke-width="1.5" stroke-linecap="round" style="margin-bottom:10px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
          <div style="font-size:13px;font-weight:600;">PayPal</div>
          <div style="font-size:11px;color:var(--grey);">Internacional</div>
        </div>
        <div style="padding:18px;border-radius:12px;background:rgba(245,166,35,0.05);border:1px dashed rgba(245,166,35,0.25);text-align:center;cursor:pointer;" onclick="showAddModal()">
          <div style="width:32px;height:32px;border-radius:50%;background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;color:var(--gold);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </div>
          <div style="font-size:13px;font-weight:600;color:var(--gold);">Adicionar</div>
          <div style="font-size:11px;color:var(--grey);">Novo método</div>
        </div>
      </div>
    </div>
  </div>

</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script src="../nzimbo-auth.js"></script>
<script src="buyer-shared.js"></script>
<script>
function showAddModal() { showToast("Funcionalidade em integração com gateway de pagamento.", "info"); }
function removePayment(btn) {
  const card = btn.closest(".payment-method-card");
  card.style.opacity = "0.3"; card.style.pointerEvents = "none";
  showToast("Método de pagamento removido", "success");
}
function setDefault(btn) {
  document.querySelectorAll(".payment-method-card").forEach(c => c.classList.remove("selected"));
  btn.closest(".payment-method-card").classList.add("selected");
  btn.closest(".payment-method-card").innerHTML = '<div class="payment-card-default">Padrão</div>' + btn.closest(".payment-method-card").innerHTML.replace(/<div class="payment-card-default">.*?<\/div>/, "");
  showToast("Método padrão actualizado!", "success");
}
</script>

<script>
function showAddModal() { showToast('Integração com gateway de pagamento em breve.', 'info'); }
function removePayment(btn) {
  btn.closest('.payment-method-card').style.opacity = '0.3';
  btn.closest('.payment-method-card').style.pointerEvents = 'none';
  showToast('Método de pagamento removido', 'success');
}
function setDefault(btn) {
  document.querySelectorAll('.payment-method-card').forEach(c => c.classList.remove('selected'));
  btn.closest('.payment-method-card').classList.add('selected');
  showToast('Método padrão actualizado!', 'success');
}
</script>
