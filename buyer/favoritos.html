  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;" class="reveal">
    <div class="card" style="position:relative;transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
      <button onclick="removeWishlist(this)" style="position:absolute;top:12px;right:12px;z-index:2;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--error);">

      </div>
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;"><span class="badge badge-gold">Curso</span><div style="display:flex;align-items:center;gap:3px;font-size:12px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="#F5A623"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span style="color:var(--grey);">4.8</span></div></div>
        <h4 style="font-size:14px;font-weight:700;margin-bottom:4px;">Negócios Online em Angola</h4>
        <p style="font-size:12px;color:var(--grey);margin-bottom:14px;">João Diogo · 18 aulas</p>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:17px;font-weight:800;color:var(--gold);">9.500 Kz</span>
          <a href="../detalhe-curso.html" class="btn btn-gold btn-sm">Ver curso</a>

    <div class="card" style="position:relative;transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
      <button onclick="removeWishlist(this)" style="position:absolute;top:12px;right:12px;z-index:2;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--error);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>

      </div>
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;"><span class="badge badge-blue">Template</span><div style="display:flex;align-items:center;gap:3px;font-size:12px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="#F5A623"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span style="color:var(--grey);">4.7</span></div></div>

        <div style="display:flex;justify-content:space-between;align-items:center;">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>

<script src="buyer-shared.js"></script>


<script>
window.addEventListener('DOMContentLoaded', async () => {
  await new Promise(r => setTimeout(r, 200));
  const grid = document.querySelector('.reveal > [style*="grid"]') || document.querySelector('.reveal');
  if (!grid) return;
  try {
    const wishlist = await NzimboCourses.getWishlist();
    if (!wishlist.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px 20px;"><div style="font-size:48px;margin-bottom:16px;">💛</div><h3 style="font-size:18px;margin-bottom:8px;">Sem favoritos ainda</h3><p style="color:var(--grey);margin-bottom:24px;">Explora cursos e produtos e guarda os teus favoritos!</p><a href="../explorar-cursos.html" class="btn btn-gold">Explorar cursos</a></div>';
      return;
    }
    const bgs = { Marketing:'135deg,#1a1000,#3a2500', Programação:'135deg,#001420,#003050', Design:'135deg,#150020,#300040' };
    grid.innerHTML = wishlist.map(w => {
      const item = w.courses || w.products;
      if (!item) return '';
      const isCourse = !!w.course_id;
      const link = isCourse ? `../detalhe-curso.html?id=${item.id}` : `../detalhe-produto.html?id=${item.id}`;
      return `<div class="card" style="position:relative;transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
        <button onclick="removeWishlist(this,'${w.id}')" style="position:absolute;top:12px;right:12px;z-index:2;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--error);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </button>
        <div style="height:140px;background:linear-gradient(${bgs[item.category]||'135deg,#111,#222'});border-radius:var(--radius-lg) var(--radius-lg) 0 0;display:flex;align-items:center;justify-content:center;">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(245,166,35,0.6)" stroke-width="1.3" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
            <span class="badge badge-gold">${isCourse?'Curso':'Produto'}</span>
          </div>
          <h4 style="font-size:14px;font-weight:700;margin-bottom:4px;">${item.title}</h4>
          <p style="font-size:12px;color:var(--grey);margin-bottom:14px;">${item.category||''}</p>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:17px;font-weight:800;color:var(--gold);">${(item.price||0).toLocaleString('pt-AO')} Kz</span>
            <a href="${link}" class="btn btn-gold btn-sm">${isCourse?'Ver curso':'Ver produto'}</a>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
});

async function removeWishlist(btn, wishlistId) {
  const card = btn.closest('.card');
  card.style.transition = 'all 0.3s ease';
  card.style.transform = 'scale(0.9)'; card.style.opacity = '0';
  setTimeout(() => card.remove(), 300);
  try {
    await _sb.from('wishlist').delete().eq('id', wishlistId);
    showToast('Removido dos favoritos', 'info');
  } catch(e) { console.error(e); }
}
</script>
</body>
