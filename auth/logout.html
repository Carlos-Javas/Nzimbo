<!DOCTYPE html>
<html lang="pt">
<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 62 62'%3E%3Crect fill='%230c0c0c' width='62' height='62' rx='14'/%3E%3Crect fill='%23F5A623' x='8' y='8' width='46' height='46' rx='10'/%3E%3Cpolygon fill='none' stroke='%230c0c0c' stroke-width='2.2' stroke-miterlimit='10' points='17 45 21 45 21 22 35 41 35 45 40 45 40 36 43 36 43 31 40 31 40 27 43 27 43 22 40 22 40 14 35 14 35 22 35 33 28 22 22 14 17 14 17 22 13 22 13 27 17 27 17 31 13 31 13 36 17 36 17 44 17 45'/%3E%3C/svg%3E"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 62 62'%3E%3Crect fill='%230c0c0c' width='62' height='62' rx='14'/%3E%3Crect fill='%23F5A623' x='8' y='8' width='46' height='46' rx='10'/%3E%3Cpolygon fill='none' stroke='%230c0c0c' stroke-width='2.2' stroke-miterlimit='10' points='17 45 21 45 21 22 35 41 35 45 40 45 40 36 43 36 43 31 40 31 40 27 43 27 43 22 40 22 40 14 35 14 35 22 35 33 28 22 22 14 17 14 17 22 13 22 13 27 17 27 17 31 13 31 13 36 17 36 17 44 17 45'/%3E%3C/svg%3E"/>
  <meta name="theme-color" content="#0c0c0c"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terminar sessão – Nzimbo</title>
  <link rel="stylesheet" href="auth-global.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
</head>
<body>
<div style="position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(245,166,35,0.06) 0%,transparent 60%);pointer-events:none;"></div>
<div class="logout-page">
  <div style="width:100%;max-width:460px;padding:0 24px;">

    <div class="logout-card" id="logoutCard">
      <a href="../home.html" class="logo-wrap" style="justify-content:center;margin-bottom:32px;">
        <div class="logo-icon"></div><span class="logo-text">Nzimbo</span>
      </a>
      <div class="logout-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
      <h2 style="font-size:24px;font-weight:800;margin-bottom:10px;">Terminar sessão?</h2>
      <p style="font-size:15px;color:var(--grey);line-height:1.7;margin-bottom:32px;">Tens a certeza que queres sair da tua conta Nzimbo?</p>

      <div id="userPill" style="display:flex;align-items:center;gap:12px;background:var(--black2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:28px;">
        <div id="userAvatar" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#F5A623,#D4891A);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#0c0c0c;flex-shrink:0;">?</div>
        <div><div id="userName" style="font-size:14px;font-weight:600;">Utilizador</div><div id="userEmail" style="font-size:12px;color:var(--grey);">—</div></div>
        <div style="margin-left:auto;"><span style="font-size:11px;background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.25);padding:3px 10px;border-radius:50px;font-weight:600;">● Online</span></div>
      </div>

      <button class="btn-auth btn-gold" id="confirmLogout" onclick="handleLogout()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sim, terminar sessão
      </button>
      <div style="margin-top:10px;">
        <button class="btn-auth btn-outline" id="cancelBtn" style="border:1px solid var(--border);">
          Cancelar — Ficar na conta
        </button>
      </div>
    </div>

    <div id="loggedOut" style="display:none;">
      <div class="logout-card">
        <div class="success-icon" style="background:rgba(245,166,35,0.08);border-color:rgba(245,166,35,0.2);color:var(--gold);">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2 style="font-size:24px;font-weight:800;margin-bottom:10px;">Sessão terminada</h2>
        <p style="font-size:15px;color:var(--grey);line-height:1.7;margin-bottom:28px;">Saíste com segurança da tua conta Nzimbo. Até à próxima!</p>
        <a href="login.html" class="btn-auth btn-gold" style="display:flex;">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
          Entrar novamente
        </a>
        <div style="margin-top:12px;">
          <a href="../home.html" class="btn-auth btn-outline" style="display:flex;border:1px solid var(--border);">Ir para a página inicial</a>
        </div>
        <p style="font-size:12px;color:var(--grey);margin-top:20px;">
          A redirecionar em <span id="redirectCount" style="color:var(--gold);font-weight:700;">5</span>s...
        </p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
  <script src="../nzimbo-auth.js"></script>
<script src="auth-global.js"></script>
<script>
'use strict';
(async () => {
  try { await waitSB(); } catch(e) { return; }
  const profile = await NzimboAuth.getProfile();
  if (profile) {
    const initials = (profile.first_name?.[0]||'') + (profile.last_name?.[0]||'');
    document.getElementById('userAvatar').textContent = initials || '?';
    document.getElementById('userName').textContent = profile.first_name + ' ' + (profile.last_name||'');
    document.getElementById('userEmail').textContent = profile.email || '';
  }
})();

document.getElementById('cancelBtn').addEventListener('click', () => {
  history.back() || (window.location.href = '../buyer/dashboard.html');
});

async function handleLogout() {
  const btn = document.getElementById('confirmLogout');
  setButtonLoading(btn, true);
  await NzimboAuth.logout();
  document.getElementById('logoutCard').style.display = 'none';
  document.getElementById('loggedOut').style.display  = 'block';
  let count = 5;
  const el = document.getElementById('redirectCount');
  const iv = setInterval(() => {
    count--; el.textContent = count;
    if (count <= 0) { clearInterval(iv); window.location.href = '../home.html'; }
  }, 1000);
}
</script>
</body>
</html>
