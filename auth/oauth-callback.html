  <meta name="theme-color" content="#0c0c0c"/>
  <meta charset="UTF-8"/>
  <title>A autenticar... – Nzimbo</title>
  <style>
    body{background:#0c0c0c;color:#fff;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;}
    .spinner{width:40px;height:40px;border-radius:50%;border:3px solid rgba(245,166,35,0.2);border-top-color:#F5A623;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p style="color:rgba(255,255,255,0.5);font-size:14px;">A autenticar com Google...</p>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
  <script>
  (async () => {
    // Supabase trata automaticamente do token no URL hash
    await new Promise(r => setTimeout(r, 1000));
    const session = await getSession();
    if (session) {
      const profile = await getProfile(session.user.id);
      if (profile?.type === 'creator') window.location.href = '../seller/dashboard.html';
      else window.location.href = '../buyer/dashboard.html';
    } else {
      window.location.href = 'login.html';
    }
  })();
  </script>
</body>
</html>
